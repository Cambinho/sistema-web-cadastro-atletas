{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="login-container">
    <h2>Login do Administrador</h2>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        <label>Usuário</label>
        <input type="text" name="usuario" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">Entrar</button>
    </form>
</div>

{% endblock %}
