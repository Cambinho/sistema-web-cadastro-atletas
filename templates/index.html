{% extends "base.html" %}
{% block title %}Admin{% endblock %}

{% block content %}

<h2>Painel Administrativo</h2>

<a href="{{ url_for('novo_atleta') }}" class="btn">Cadastrar novo atleta</a>

<div class="card-container">
    {% for atleta in atletas %}
        <div class="card admin">
            <h3>{{ atleta.nome }}</h3>
            <p>{{ atleta.esporte }}</p>
            <a href="#" class="btn-small">Editar</a>
            <a href="#" class="btn-small danger">Excluir</a>
        </div>
    {% endfor %}
</div>

{% endblock %}
