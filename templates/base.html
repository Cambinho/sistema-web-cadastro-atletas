<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Brasil nos Jogos de Inverno{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Brasil nos Jogos Olímpicos de Inverno</h1>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>

        {% if session.get('admin') %}
            <a href="{{ url_for('admin') }}">Admin</a>
            <a href="{{ url_for('logout') }}">Sair</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>Projeto educacional – Flask & Jinja2</p>
</footer>

</body>
</html>
